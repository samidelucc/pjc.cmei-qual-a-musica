  c4:'linear-gradient(160deg,#f5f0ee,#e8ddd9)',
  c5:'linear-gradient(160deg,#fff5e6,#fde3b8)',
  c6:'linear-gradient(160deg,#edf7ee,#d0ecd1)',
  c7:'linear-gradient(160deg,#e3f0fd,#bcd6f8)',
  c8:'linear-gradient(160deg,#f5e8fc,#e2c4f5)',
  c9:'linear-gradient(160deg,#fff0f0,#fdd5d5)',
  c10:'linear-gradient(160deg,#e0f7fa,#b0e8ed)',
  c11:'linear-gradient(160deg,#fffde7,#fdf0b0)',
  c12:'linear-gradient(160deg,#edf7ee,#c5e8c7)',
  c13:'linear-gradient(160deg,#e0f7fa,#80deea)',
  c14:'linear-gradient(160deg,#fffde7,#ffe8a0)'
};

const grid = document.getElementById('grid');

cards.forEach(c => {
  const div = document.createElement('div');
  div.className = `card ${c.color}`;
  div.setAttribute('role', 'button');
  div.setAttribute('tabindex', '0');
  div.setAttribute('aria-label', `${c.title} – ${c.artist}`);
  div.innerHTML = `
    <div class="card-number">${c.num}</div>
    <span class="card-emoji">${c.emoji}</span>
    <div class="card-title">${c.title}</div>
    <div class="card-artist">${c.artist}</div>
    <div class="card-desc">${c.desc}</div>
  `;
  div.addEventListener('click', () => openModal(c));
  div.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(c); });
  grid.appendChild(div);
});

const overlay = document.getElementById('overlay');
const modal   = document.getElementById('modal');

function openModal(c) {
  document.getElementById('mNum').textContent = c.num;
  document.getElementById('mNum').style.background = numColors[c.color];
  document.getElementById('mEmoji').textContent = c.emoji;
  document.getElementById('mTitle').textContent = c.title;
  document.getElementById('mArtist').textContent = c.artist;
  document.getElementById('mDesc').textContent = c.desc;

  const audio = document.getElementById('audioPlayer');
  if (c.src) {
    audio.src = c.src;
    audio.style.display = 'block';
    audio.load();
    audio.addEventListener('loadedmetadata', function seekAndPlay() {
      audio.currentTime = c.start;
      audio.play().catch(() => {});
      audio.removeEventListener('loadedmetadata', seekAndPlay);
    });
    // stop at end time
    audio._endTime = c.end;
  } else {
    audio.src = '';
    audio.style.display = 'none';
  }

  modal.style.borderColor = numColors[c.color];
  modal.style.boxShadow = `0 30px 80px rgba(0,0,0,.6), 0 0 30px ${numColors[c.color]}55`;
  modal.style.background = modalBg[c.color];

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const audio = document.getElementById('audioPlayer');
  audio.pause();
  audio.src = '';
  audio._endTime = null;
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

// watch for end time
document.getElementById('audioPlayer').addEventListener('timeupdate', function() {
  if (this._endTime && this.currentTime >= this._endTime) {
    this.pause();
    this.currentTime = this._endTime;
  }
});

document.getElementById('closeBtn').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
